name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  security-events: write
  pull-requests: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: jxc-darwin-arm64
          - os: ubuntu-latest
            artifact: jxc-linux-amd64
          - os: windows-latest
            artifact: jxc-windows-amd64
            msys2: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 (Windows)
        if: matrix.msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake

      - name: Add MinGW64 to PATH
        if: matrix.msys2
        shell: bash
        run: echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"

      - name: Probe Windows env
        if: matrix.msys2
        shell: bash
        run: |
          echo "--- MSYS env vars ---"
          env | grep -iE "msys|gcc|pkg" 2>&1 | head -20
          echo
          echo "--- which gcc/cmake/make (where.exe via cmd) ---"
          cmd //c "where gcc & where cmake & where make & where g++ & where pacman" 2>&1
          echo
          echo "--- PATH (msys2 paths) ---"
          echo "$PATH" | tr ':' '\n' | grep -i msys
          echo
          echo "--- looking for msys2 install ---"
          ls -la "C:/msys64" 2>&1 | head -5 || echo "(no C:/msys64)"
          ls -la "/c/_msys2" 2>&1 | head -5 || echo "(no C:/_msys2)"
          ls -la "$HOME/_msys2" 2>&1 | head -5 || echo "(no HOME/_msys2)"
          echo
          echo "--- ls any libstdc* under C:/ ---"
          find /c -name 'libstdc*' 2>/dev/null | head -10
          echo
          echo "--- mingw64/lib listing (if dir exists) ---"
          ls -la "/c/msys64/mingw64/lib" 2>/dev/null | grep -i stdc | head -10 || echo "(no msys64/mingw64/lib)"

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Build
        run: zig build -Doptimize=ReleaseSafe

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --deep -s - zig-out/bin/jxc

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.artifact }}.tar.gz -C zig-out/bin jxc

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path zig-out/bin/jxc.exe -DestinationPath ${{ matrix.artifact }}.zip

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.*
          generate_release_notes: true
