name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  security-events: write
  pull-requests: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: jxc-darwin-arm64
          - os: ubuntu-latest
            artifact: jxc-linux-amd64
          - os: windows-latest
            artifact: jxc-windows-amd64
            msys2: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Add Strawberry MinGW to PATH (Windows)
        if: matrix.msys2
        run: echo "C:/Strawberry/c/bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build -Doptimize=ReleaseSafe

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --deep -s - zig-out/bin/jxc

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.artifact }}.tar.gz -C zig-out/bin jxc

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path zig-out/bin/jxc.exe -DestinationPath ${{ matrix.artifact }}.zip

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.*
          generate_release_notes: true
