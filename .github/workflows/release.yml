name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  security-events: write
  pull-requests: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: jxc-darwin-arm64
          - os: ubuntu-latest
            artifact: jxc-linux-amd64
          - os: windows-latest
            artifact: jxc-windows-amd64
            msys2: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 (Windows)
        if: matrix.msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          release: 2024-05-07
          update: true
          install: >-
            git
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake

      - name: Add MinGW64 to PATH
        if: matrix.msys2
        shell: bash
        run: echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"

      - name: Probe Windows env
        if: matrix.msys2
        shell: bash
        run: |
          echo "--- libstdc* under C:/mingw64 ---"
          ls -la "C:/mingw64/lib"/libstdc* 2>&1 | head -10
          echo
          echo "--- C:/mingw64/lib gcc-lib subdir ---"
          find "/c/mingw64/lib" -name 'libstdc*' 2>/dev/null | head -10
          echo
          echo "--- gcc at C:/mingw64 reports own libstdc++ path ---"
          "C:/mingw64/bin/gcc.exe" -print-file-name=libstdc++.a 2>&1
          echo
          echo "--- gcc --version ---"
          "C:/mingw64/bin/gcc.exe" --version 2>&1 | head -2
          echo
          echo "--- gcc's libstdc++ dir ---"
          "C:/mingw64/bin/gcc.exe" -print-search-dirs 2>&1 | head -5

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build -Doptimize=ReleaseSafe

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --deep -s - zig-out/bin/jxc

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.artifact }}.tar.gz -C zig-out/bin jxc

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path zig-out/bin/jxc.exe -DestinationPath ${{ matrix.artifact }}.zip

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.*
          generate_release_notes: true
