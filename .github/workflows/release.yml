name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  security-events: write
  pull-requests: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: jxc-darwin-arm64
          - os: ubuntu-latest
            artifact: jxc-linux-amd64
          - os: windows-latest
            artifact: jxc-windows-amd64
            msys2: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 (Windows)
        if: matrix.msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake

      - name: Add MinGW64 to PATH
        if: matrix.msys2
        shell: bash
        run: echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"

      - name: Probe Strawberry's libstdc++.a (Windows)
        if: matrix.msys2
        shell: bash
        run: |
          echo "--- Strawberry gcc ---"
          "/c/Strawberry/c/bin/gcc.exe" --version | head -1
          echo
          echo "--- Strawberry gcc -print-file-name=libstdc++.a ---"
          STRDCPY=$(/c/Strawberry/c/bin/gcc.exe -print-file-name=libstdc++.a 2>&1)
          echo "  $STRDCPY"
          ls -la "$STRDCPY" 2>&1 || echo "  (NOT FOUND)"
          echo
          echo "--- Strawberry gcc -print-file-name=libstdc++.dll.a ---"
          DLL=$(/c/Strawberry/c/bin/gcc.exe -print-file-name=libstdc++.dll.a 2>&1)
          echo "  $DLL"
          ls -la "$DLL" 2>&1 || echo "  (NOT FOUND)"
          echo
          echo "--- All libstdc* under C:/Strawberry ---"
          find /c/Strawberry -name 'libstdc*' 2>/dev/null | head -10

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build -Doptimize=ReleaseSafe

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --deep -s - zig-out/bin/jxc

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.artifact }}.tar.gz -C zig-out/bin jxc

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path zig-out/bin/jxc.exe -DestinationPath ${{ matrix.artifact }}.zip

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.*
          generate_release_notes: true
